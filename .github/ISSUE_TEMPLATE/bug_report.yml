name: Bug report
description: Report a bug in the API
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps to reproduce the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Add any relevant logs, payloads, or screenshots.

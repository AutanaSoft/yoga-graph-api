name: Bug report
description: Report a reproducible issue in the API
title: '[Bug] '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.
        Please include enough detail so we can reproduce and fix it quickly.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this affect production usage?
      options:
        - Low (minor behavior issue)
        - Medium (partial functionality impacted)
        - High (core functionality broken)
        - Critical (service unavailable / data risk)
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: 'Example: local / staging / production'
      placeholder: local
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the issue clearly.
      placeholder: A clear and concise description of what is happening.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps to reproduce the bug.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Add any relevant logs, payloads, or screenshots.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I verified this is not a duplicate issue.
          required: true
        - label: I included enough context to reproduce.
          required: true

name: Refactor / Technical task
description: Track technical improvements, refactors, or architecture tasks
title: '[Task] '
labels:
  - chore
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should be improved and why?
      placeholder: Describe the technical goal and expected value.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
      placeholder: |
        In scope:
        -
        Out of scope:
        -
    validations:
      required: true

  - type: textarea
    id: implementation-notes
    attributes:
      label: Implementation notes
      description: Constraints, architecture rules, or references.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

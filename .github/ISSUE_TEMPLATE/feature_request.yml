name: Feature request
description: Propose an improvement or new capability
title: '[Feature] '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal.
        Please describe the problem and expected outcome with clear acceptance criteria.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What are you trying to improve?
      placeholder: Describe the pain point and who is affected.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want.
      placeholder: Describe the expected behavior and API contract.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Define concrete criteria to consider this done.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: Estimated impact level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, alternatives, or constraints.
